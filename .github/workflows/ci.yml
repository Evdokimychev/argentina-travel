name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      GIT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: RLS audit
        run: node scripts/rls-audit.mjs

      - name: Blog image perf audit
        run: npm run blog-image-perf-audit

      - name: Blog MD sync check
        run: npm run sync-manual-posts:check && npm run sync-rich-articles:check

      - name: Blog hero audit
        run: node scripts/audit-blog-heroes.mjs --strict

      - name: Cornerstone media check
        run: npm run register-cornerstone-media:check

      - name: Content-plan redirects manifest
        run: npm run sync-content-plan-redirects:check

      - name: Legacy blog media slugs
        run: npm run prune-legacy-blog-media:check

      - name: CMS media deploy check
        run: npm run cms-media:deploy-check

      - name: Migration meta
        run: node scripts/write-migration-meta.mjs

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://www.goargentina.ru

      - name: Bundle size report
        run: npm run bundle:report
        continue-on-error: true

      - name: Lighthouse blog CWV
        env:
          LIGHTHOUSE_BASE_URL: http://127.0.0.1:3000
          LIGHTHOUSE_CATEGORIES: performance,accessibility
          LIGHTHOUSE_SAMPLE_PATHS: /blog,/blog/authors,/blog/hub/patagonia,/blog/patagonia-packing-list,/blog/natsionalnyy-park-iguasu
        run: node scripts/lighthouse-ci.mjs
